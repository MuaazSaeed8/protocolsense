<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProtocolSense - AI System Behavior Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0e0e0f',
              surface: '#171719',
              'on-surface': '#f0f0f1',
              primary: '#A8C7FA',
              secondary: '#C4EED0',
              'surface-variant': '#2d2e31',
              'on-surface-variant': '#9aa0a6',
              'surface-container': '#1e1f21',
              'surface-container-high': '#28292c',
              error: '#F2B8B5',
              success: '#C4EED0',
              warning: '#F9D949',
              aiPurple: '#D0BCFF',
              aiBlue: '#8AB4F8',
              aiTeal: '#81C995',
            },
            fontFamily: {
              sans: ['Google Sans', 'Roboto', 'Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            },
            borderRadius: {
              'md3-card': '32px',
              'md3-item': '24px',
              'md3-btn': '28px',
            }
          }
        }
      }
    </script>
    <style>
        body {
            background-color: #0e0e0f;
            color: #f0f0f1;
            margin: 0;
            padding: 0;
            /* overflow: hidden; Removed to allow scrolling on mobile */
            font-family: 'Google Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        .code-font {
            font-family: 'Fira Code', monospace;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2d2e31;
            border-radius: 10px;
        }
        
        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple::after {
            content: "";
            display: block;
            position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform .5s, opacity 1s;
        }
        .ripple:active::after {
            transform: scale(0, 0);
            opacity: .1;
            transition: 0s;
        }

        .spotlight-mask {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 150;
            background: rgba(0, 0, 0, 0.85);
            mask-image: radial-gradient(
              circle at var(--mask-x, 50%) var(--mask-y, 50%),
              transparent var(--mask-size, 0px),
              black calc(var(--mask-size, 0px) + 2px)
            );
            -webkit-mask-image: radial-gradient(
              circle at var(--mask-x, 50%) var(--mask-y, 50%),
              transparent var(--mask-size, 0px),
              black calc(var(--mask-size, 0px) + 2px)
            );
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        textarea {
            resize: none;
        }
        
        .text-display {
            font-size: clamp(2.25rem, 6vw, 4rem);
            line-height: 1.05;
            font-weight: 500;
            letter-spacing: -0.03em;
        }

        .ai-gradient-text {
            background: linear-gradient(90deg, #D0BCFF, #8AB4F8, #81C995);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ai-assistant-section {
            background: linear-gradient(135deg, #D0BCFF 0%, #8AB4F8 50%, #81C995 100%);
            border-radius: 16px;
            color: #1a1a1b; /* Dark grey text for contrast on light gradient */
            position: relative;
            z-index: 1;
        }

        .ai-gradient-glow {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: linear-gradient(90deg, #D0BCFF, #8AB4F8, #81C995);
            border-radius: 20px;
            z-index: -1;
            filter: blur(25px);
            opacity: 0.1;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
